{% extends "base.html" %}
{% block title %}Edit Tag — {{ tag.name }}{% endblock %}

{% block content %}
<div class="section-header">
  <div class="section-title">Edit Tag</div>
  <div class="section-sub" style="font-family:var(--mono); color:var(--amber);">{{ tag.name }} — {{ tag.address }}</div>
</div>

<form method="post">
  <div class="card">
    <div class="card-title">Tag Properties</div>
    <div class="form-grid">
      <div class="field form-full">
        <label>Description</label>
        <input type="text" name="description" value="{{ tag.description }}">
      </div>
      <div class="field">
        <label>Instrument Model</label>
        <input type="text" name="instrument_model" value="{{ tag.instrument_model }}" placeholder="Rosemount 3051 CD">
      </div>
      <div class="field">
        <label>Engineering Units</label>
        <input type="text" name="eng_units" value="{{ tag.eng_units }}" placeholder="GPM">
      </div>
    </div>
  </div>

  {% if tag.io_type.name in ('AI', 'AO') %}
  <div class="card">
    <div class="card-title">Scaling</div>
    <div class="form-grid-3">
      <div class="field">
        <label>Span Low</label>
        <input type="number" step="any" name="span_low" value="{{ tag.span_low }}">
      </div>
      <div class="field">
        <label>Span High</label>
        <input type="number" step="any" name="span_high" value="{{ tag.span_high }}">
      </div>
      <div class="field">
        <label>√ Extraction</label>
        <select name="sqrt_extraction">
          {% for opt in sqrt_options %}
          <option value="{{ opt.name }}" {% if tag.sqrt_extraction == opt %}selected{% endif %}>{{ opt.value }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="field">
        <label>DP Range High</label>
        <input type="number" step="any" name="dp_range_high" value="{{ tag.dp_range_high }}">
      </div>
      <div class="field">
        <label>DP Units</label>
        <input type="text" name="dp_units" value="{{ tag.dp_units }}" placeholder="in H2O">
      </div>
    </div>
  </div>
  {% endif %}

  <div class="card">
    <div class="card-title">Notes</div>
    <div class="field">
      <textarea name="notes">{{ tag.notes }}</textarea>
    </div>
  </div>

  <div style="display:flex; gap:10px;">
    <button type="submit" class="btn btn-primary">Save Tag</button>
    <a href="{{ url_for('import_tags') }}" class="btn btn-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
